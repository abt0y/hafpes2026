name: CI Download Drive File

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v4

      # 2. Set up Python (required to install gdown)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. Install gdown
      - name: Install gdown
        run: pip install gdown

      # 4. Download the file using its Google Drive ID
      - name: Download file from Google Drive
        run: gdown "1GkqWwmB0F_IJ9v9ZiwI6-MYwGk9dP1vJ"

      # 5. Verify the file was downloaded successfully
      - name: Verify Download
        run: |
          echo "Listing files in the current directory:"
          ls -lh
