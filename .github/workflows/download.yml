name: Download and Save to Repo

# It is best to only trigger this manually. 
# If triggered on "push", saving the file to the repo will create a new push, 
# which could accidentally trigger an infinite loop of workflows!
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # IMPORTANT: You must grant the action permission to write/push to your repository
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install gdown
        run: pip install gdown

      - name: Download file from Google Drive
        run: gdown "1GkqWwmB0F_IJ9v9ZiwI6-MYwGk9dP1vJ"

      # This step configures Git, adds the downloaded file, and pushes it to your main branch
      - name: Commit and push file to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "*.mp4"
          git commit -m "Add downloaded Google Drive video"
          git push
